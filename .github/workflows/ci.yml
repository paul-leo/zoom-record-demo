name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Typecheck / Test / Build
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            # Pinned to commit SHA — never use floating @v4 tags for third-party actions.
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Setup pnpm
              uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  version: 9.15.0
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              # --ignore-scripts blocks postinstall hooks (supply-chain hardening).
              # Frozen lockfile prevents silent version drift.
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Verify dependency signatures
              run: npm audit signatures || echo "::warning::audit signatures reported issues"

            - name: Typecheck
              run: pnpm typecheck

            - name: Build
              run: pnpm build

            - name: Test
              run: pnpm test
